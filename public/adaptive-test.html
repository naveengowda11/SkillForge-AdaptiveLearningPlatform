<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SkillForge Adaptive Test</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:#fff;
}

.content{
flex:1;
padding:40px;
overflow:auto;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
max-width:700px;
}

.timer{
font-weight:600;
margin-bottom:10px;
color:#444;
}

.progress-bar{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

#progressFill{
height:100%;
width:0%;
background:#6c7cff;
}

.options label{
display:block;
margin:10px 0;
padding:12px;
border-radius:10px;
background:#f3f4ff;
cursor:pointer;
}

button.next-btn{
margin-top:20px;
background:#6c7cff;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

.result-box{
display:none;
margin-top:20px;
}

canvas{
margin-top:20px;
background:#f3f4ff;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-4-line"></i>
</button>

<button onclick="location.href='courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button class="active">
<i class="ri-brain-line"></i>
</button>

<button onclick="location.href='performance.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='settings.html'">
<i class="ri-settings-3-line"></i>
</button>

</div>

<div class="content">

<h1 id="courseTitle">Adaptive Test</h1>

<div class="card">

<div class="timer">
Time Left: <span id="timeLeft">60</span>s
</div>

<div class="progress-bar">
<div id="progressFill"></div>
</div>

<div id="testArea"></div>

<button class="next-btn" id="nextBtn">Next Question</button>

<div class="result-box" id="resultBox">

<h2>Your Score</h2>

<p id="scoreText"></p>

<canvas id="barChart"></canvas>

<button class="next-btn" onclick="startCourse()">
Start Course
</button>

</div>

</div>

</div>

</div>

<script>

const token = localStorage.getItem("token");
const course = localStorage.getItem("selectedCourse");

if(!token){
window.location.href="login.html";
}

if(!course){
alert("No course selected.");
window.location.href="courses.html";
}

document.getElementById("courseTitle").innerText =
course + " Adaptive Test";

/* VARIABLES */

let questions = [];
let currentQuestion = 0;
let score = 0;
let timeLeft = 60;
let timer;

/* LOAD QUESTIONS */

async function loadQuestions(){

try{

const res = await fetch(
`http://localhost:5000/api/quiz/${course}`
);

const data = await res.json();

if(!data || data.length === 0){

document.getElementById("testArea").innerHTML =
"<p>No quiz available for this course.</p>";

document.getElementById("nextBtn").style.display="none";
return;

}

questions = data.map(q=>({
q:q.question,
options:[q.option1,q.option2,q.option3,q.option4],
answer:q.answer
}));

showQuestion();

}catch(err){

console.log("Quiz load error",err);

document.getElementById("testArea").innerHTML =
"<p>Failed to load quiz.</p>";

}

}

loadQuestions();

/* TIMER */

function startTimer(){

clearInterval(timer);

timeLeft=60;
document.getElementById("timeLeft").innerText=timeLeft;

timer=setInterval(()=>{

timeLeft--;
document.getElementById("timeLeft").innerText=timeLeft;

if(timeLeft<=0){
clearInterval(timer);
nextQuestion();
}

},1000);

}

/* SHOW QUESTION */

function showQuestion(){

const q = questions[currentQuestion];

let optionsHTML="";

q.options.forEach((opt,i)=>{

optionsHTML+=`
<label>
<input type="radio" name="option" value="${i}">
${opt}
</label>
`;

});

document.getElementById("testArea").innerHTML=`

<h3>Question ${currentQuestion+1} of ${questions.length}</h3>

<p style="margin:15px 0">${q.q}</p>

<div class="options">
${optionsHTML}
</div>

`;

document.getElementById("progressFill").style.width =
(currentQuestion/questions.length)*100+"%";

if(currentQuestion === questions.length-1){
document.getElementById("nextBtn").innerText="Submit Test";
}

startTimer();

}

/* NEXT BUTTON */

document.getElementById("nextBtn").addEventListener("click",nextQuestion);

function nextQuestion(){

clearInterval(timer);

const selected =
document.querySelector("input[name='option']:checked");

if(!selected){
alert("Select an option");
return;
}

const value=parseInt(selected.value);

if(value === questions[currentQuestion].answer){
score++;
}

currentQuestion++;

if(currentQuestion < questions.length){
showQuestion();
}else{
showResults();
}

}

/* SHOW RESULT */

async function showResults(){

document.getElementById("testArea").style.display="none";
document.getElementById("nextBtn").style.display="none";

document.getElementById("progressFill").style.width="100%";

document.getElementById("resultBox").style.display="block";

document.getElementById("scoreText").innerText =
"You scored "+score+" / "+questions.length;

try{
await fetch("http://localhost:5000/api/save-test-result",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
course:course,
score:score,
total:questions.length,
weakest_domain:course
})
});
}catch(err){

console.log("Result save error");

}

/* CHART */

new Chart(document.getElementById("barChart"),{

type:"bar",

data:{
labels:["Correct","Wrong"],
datasets:[{
data:[score,questions.length-score],
backgroundColor:["#6c7cff","#ff6b6b"]
}]
},

options:{
plugins:{legend:{display:false}}
}

});

}

/* START COURSE */

function startCourse(){

window.location.href="course-player.html";

}

</script>

</body>
</html>
