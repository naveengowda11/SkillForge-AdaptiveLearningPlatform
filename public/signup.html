<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up - SkillForge</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

.loading-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
color:white;
font-size:20px;
font-weight:600;
display:none;
}

.spinner{
width:35px;
height:35px;
border:4px solid #334155;
border-top:4px solid #60a5fa;
border-radius:50%;
animation:spin 1s linear infinite;
margin-right:10px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body class="auth-body">

<div class="loading-screen" id="loadingScreen">
<div class="spinner"></div>
Processing...
</div>

<div class="auth-wrapper">

<div class="auth-card">

<h2>Create Account</h2>
<p class="auth-sub">Start your adaptive AI journey today</p>

<form class="auth-form">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="password" id="password" placeholder="Password (min 6 chars)" required>

<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

<div id="otpSection" style="display:none">

<input type="text" id="otpInput" placeholder="Enter OTP">

<button type="button" class="primary-btn full-btn" onclick="verifyOTP()" id="verifyBtn">
Verify OTP
</button>

</div>

<button type="button" id="sendOtpBtn" class="primary-btn full-btn" onclick="sendOTP()">
Send OTP
</button>

<button type="submit" id="registerBtn" class="primary-btn full-btn" style="display:none">
Register
</button>

</form>

<p class="auth-link">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>
</div>

<script>

/* ================= THEME LOAD ================= */

const theme = localStorage.getItem("theme");

if(theme === "dark"){
document.body.classList.add("dark");
}


/* ================= LOADING ================= */

const loading = document.getElementById("loadingScreen");


/* ================= OTP SEND ================= */

async function sendOTP(){

const email = document.getElementById("email").value;

if(!email){
alert("Please enter email first");
return;
}

loading.style.display="flex";

try{

const res = await fetch("http://localhost:5000/api/send-otp",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({email})

});

const data = await res.json();

loading.style.display="none";

if(res.ok){

alert("OTP sent to your email");

document.getElementById("otpSection").style.display="block";

}else{

alert(data.message || "Failed to send OTP");

}

}catch(err){

loading.style.display="none";
alert("Server error");

}

}


/* ================= OTP VERIFY ================= */

async function verifyOTP(){

const email = document.getElementById("email").value;
const otp = document.getElementById("otpInput").value;

loading.style.display="flex";

try{

const res = await fetch("http://localhost:5000/api/verify-otp",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({email,otp})

});

const data = await res.json();

loading.style.display="none";

if(res.ok && data.verified){

alert("OTP Verified");

document.getElementById("sendOtpBtn").style.display="none";
document.getElementById("otpSection").style.display="none";

document.getElementById("registerBtn").style.display="block";

}else{

alert("Invalid OTP");

}

}catch(err){

loading.style.display="none";
alert("Server error");

}

}


/* ================= REGISTER ================= */

const form = document.querySelector(".auth-form");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const confirmPassword = document.getElementById("confirmPassword").value;


if(password.length < 6){

alert("Password must be at least 6 characters");
return;

}

if(password !== confirmPassword){

alert("Passwords do not match");
return;

}

loading.style.display="flex";

try{

const res = await fetch("http://localhost:5000/api/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({name,email,password})

});

const data = await res.json();

loading.style.display="none";

if(res.ok){

alert("Registration successful!");

window.location.href="login.html";

}else{

alert(data.message || "Registration failed");

}

}catch(err){

loading.style.display="none";
alert("Server error");

}

});

</script>

</body>
</html>
