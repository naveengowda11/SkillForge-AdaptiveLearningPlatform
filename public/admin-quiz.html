<!DOCTYPE html>
<html>
<head>
<title>Quiz Manager</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.content{
flex:1;
padding:30px;
overflow:auto;
}

.card{
background:white;
padding:20px;
border-radius:18px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#6c7cff;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='admin-dashboard.html'">
<i class="ri-dashboard-line"></i>
</button>

<button onclick="location.href='admin-courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button class="active">
<i class="ri-question-line"></i>
</button>

<button onclick="location.href='admin-feedback.html'">
<i class="ri-chat-3-line"></i>
</button>

</div>

<div class="content">

<h1>Quiz Manager</h1>

<div class="card">

<input id="course" placeholder="Course Name">
<input id="question" placeholder="Question">

<input id="o1" placeholder="Option 1">
<input id="o2" placeholder="Option 2">
<input id="o3" placeholder="Option 3">
<input id="o4" placeholder="Option 4">

<input id="answer" placeholder="Correct option number">

<button onclick="addQuestion()">Add Question</button>

</div>

</div>

</div>

<script>

async function addQuestion(){

const data = {
course:document.getElementById("course").value,
question:document.getElementById("question").value,
option1:o1.value,
option2:o2.value,
option3:o3.value,
option4:o4.value,
answer:answer.value
};

await fetch("http://localhost:5000/api/admin/add-question",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

alert("Question added");

}

</script>

</body>
</html>
