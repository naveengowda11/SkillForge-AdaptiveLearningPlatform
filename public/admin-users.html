<!DOCTYPE html>

<html>
<head>

<title>Admin Users</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
}

.content{
flex:1;
padding:30px;
overflow:auto;
}

.user{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.user button{
margin-left:10px;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.delete{
background:#ff5c5c;
color:white;
}

.reset{
background:#6c7cff;
color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='admin-dashboard.html'">
<i class="ri-dashboard-line"></i>
</button>

<button onclick="location.href='admin-courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='admin-quiz.html'">
<i class="ri-question-line"></i>
</button>

<button onclick="location.href='admin-feedback.html'">
<i class="ri-chat-3-line"></i>
</button>

<button onclick="location.href='admin-analytics.html'">
<i class="ri-bar-chart-line"></i>
</button>

</div>

<div class="content">

<h1>Users</h1>

<div id="userList"></div>

</div>

</div>

<script>

async function loadUsers(){

const res = await fetch("http://localhost:5000/api/admin/users");
const users = await res.json();

const container = document.getElementById("userList");

container.innerHTML="";

users.forEach(u=>{

container.innerHTML+=`

<div class="user">

<div>
<b>${u.name}</b><br>
${u.email}
</div>

<div>

<button class="reset" onclick="resetPassword(${u.id})">
Reset Password
</button>

<button class="delete" onclick="deleteUser(${u.id})">
Delete
</button>

</div>

</div>

`;

});

}

async function deleteUser(id){

await fetch("http://localhost:5000/api/admin/user/"+id,{
method:"DELETE"
});

loadUsers();

}

async function resetPassword(id){

const newPassword = prompt("Enter new password");

if(!newPassword) return;

await fetch("http://localhost:5000/api/admin/reset-password",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
userId:id,
newPassword:newPassword
})

});

alert("Password reset");

}

loadUsers();

</script>

</body>
</html>
