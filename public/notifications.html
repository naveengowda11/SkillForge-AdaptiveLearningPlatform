<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillForge Notifications</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:#fff;
}

/* CONTENT */

.content{
flex:1;
padding:40px;
overflow:auto;
}

.notifications-card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
max-width:700px;
}

/* NOTIFICATION ITEM */

.notification{
display:flex;
align-items:center;
gap:15px;
padding:14px;
border-radius:12px;
margin-bottom:12px;
background:#f3f4ff;
}

.notification i{
font-size:22px;
color:#6c7cff;
}

.notification-text{
flex:1;
}

.time{
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-4-line"></i>
</button>

<button onclick="location.href='courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='adaptive-test.html'">
<i class="ri-brain-line"></i>
</button>

<button onclick="location.href='performance.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='files.html'">
<i class="ri-file-text-line"></i>
</button>

<button onclick="location.href='certificates.html'">
<i class="ri-award-line"></i>
</button>

<button onclick="location.href='messages.html'">
<i class="ri-message-2-line"></i>
</button>

<button onclick="location.href='settings.html'">
<i class="ri-settings-3-line"></i>
</button>

<button class="active">
<i class="ri-notification-3-line"></i>
</button>

</div>

<!-- MAIN CONTENT -->

<div class="content">

<h1 style="margin-bottom:25px;">Notifications</h1>

<div class="notifications-card">

<div class="notification">
<i class="ri-user-add-line"></i>
<div class="notification-text">
Anna Morgan sent you a friend request
</div>
<div class="time">2 min ago</div>
</div>

<div class="notification">
<i class="ri-message-3-line"></i>
<div class="notification-text">
New message from Instructor
</div>
<div class="time">10 min ago</div>
</div>

<div class="notification">
<i class="ri-trophy-line"></i>
<div class="notification-text">
You unlocked a certificate for Machine Learning Foundations
</div>
<div class="time">1 hour ago</div>
</div>

<div class="notification">
<i class="ri-book-open-line"></i>
<div class="notification-text">
New course added: Deep Learning Advanced
</div>
<div class="time">Yesterday</div>
</div>

<div class="notification">
<i class="ri-bar-chart-line"></i>
<div class="notification-text">
Your performance improved this week
</div>
<div class="time">2 days ago</div>
</div>

</div>

</div>

</div>

</body>
</html>
