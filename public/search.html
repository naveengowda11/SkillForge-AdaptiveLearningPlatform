<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillForge Notifications</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
z-index:9999;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:#fff;
}

.content{
flex:1;
padding:40px;
overflow:auto;
}

.notifications-card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
max-width:700px;
}

.notification{
display:flex;
align-items:center;
gap:15px;
padding:14px;
border-radius:12px;
margin-bottom:12px;
background:#f3f4ff;
}

.notification i{
font-size:22px;
color:#6c7cff;
}

.notification-text{
flex:1;
}

.time{
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div id="loading" class="loading">Loading notifications...</div>

<div class="container">

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-4-line"></i>
</button>

<button onclick="location.href='courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='adaptive-test.html'">
<i class="ri-brain-line"></i>
</button>

<button onclick="location.href='performance.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='files.html'">
<i class="ri-file-text-line"></i>
</button>

<button onclick="location.href='certificates.html'">
<i class="ri-award-line"></i>
</button>

<button onclick="location.href='messages.html'">
<i class="ri-message-2-line"></i>
</button>

<button onclick="location.href='settings.html'">
<i class="ri-settings-3-line"></i>
</button>

<button class="active">
<i class="ri-notification-3-line"></i>
</button>

</div>

<div class="content">

<h1 style="margin-bottom:25px;">Notifications</h1>

<div class="notifications-card" id="notificationsList"></div>

</div>

</div>

<script>

const token = localStorage.getItem("token");
const userId = localStorage.getItem("userId");

if(!token){
window.location.href="login.html";
}

/* LOAD NOTIFICATIONS */

async function loadNotifications(){

const container = document.getElementById("notificationsList");

container.innerHTML="";

/* FRIEND REQUESTS */

const res1 = await fetch("http://localhost:5000/api/friends/"+userId);

const friends = await res1.json();

friends.forEach(f=>{

const div = document.createElement("div");

div.className="notification";

div.innerHTML=`
<i class="ri-user-line"></i>
<div class="notification-text">
You are now friends with ${f.username || f.name}
</div>
<div class="time">recent</div>
`;

container.appendChild(div);

});


/* CERTIFICATES */

const res2 = await fetch("http://localhost:5000/api/certificates/"+userId);

const certs = await res2.json();

certs.forEach(c=>{

const div = document.createElement("div");

div.className="notification";

div.innerHTML=`
<i class="ri-trophy-line"></i>
<div class="notification-text">
You unlocked certificate for ${c.course}
</div>
<div class="time">${c.date.slice(0,10)}</div>
`;

container.appendChild(div);

});

}

/* INIT */

loadNotifications();

document.getElementById("loading").style.display="none";

</script>

</body>
</html>
