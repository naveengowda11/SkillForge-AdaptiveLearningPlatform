<!DOCTYPE html>
<html>
<head>

<title>Final Quiz Questions</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:white;
}

/* CONTENT */

.content{
flex:1;
padding:40px;
overflow:auto;
}

.card{
background:white;
padding:30px;
border-radius:18px;
max-width:900px;
}

/* INPUTS */

input,select{
width:100%;
padding:12px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
outline:none;
}

/* BUTTON */

.add-btn{
background:linear-gradient(135deg,#6c7cff,#5a67ff);
color:white;
border:none;
padding:12px 24px;
border-radius:10px;
cursor:pointer;
font-size:14px;
font-weight:500;
transition:all 0.2s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.add-btn:hover{
transform:translateY(-1px);
box-shadow:0 6px 14px rgba(0,0,0,0.12);
}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<button onclick="location.href='admin-dashboard.html'">
<i class="ri-dashboard-line"></i>
</button>

<button class="active">
<i class="ri-question-line"></i>
</button>

</div>

<!-- CONTENT -->

<div class="content">

<h1>Final Quiz Questions</h1>

<div class="card">

<select id="courseSelect">
<option value="">Select Course</option>
</select>

<input id="question" placeholder="Question">

<input id="o1" placeholder="Option 1">
<input id="o2" placeholder="Option 2">
<input id="o3" placeholder="Option 3">
<input id="o4" placeholder="Option 4">

<input id="answer" placeholder="Correct option number (1-4)">

<button class="add-btn" onclick="addQuestion()">
Add Question
</button>

</div>

</div>

</div>

<script>

const API="http://localhost:5000";

/* LOAD COURSES */

async function loadCourses(){

try{

const res=await fetch(API+"/api/admin/courses");

const courses=await res.json();

const select=document.getElementById("courseSelect");

courses.forEach(course=>{

const option=document.createElement("option");

option.value=course.title || course.course || course.name;
option.textContent=course.title || course.course || course.name;

select.appendChild(option);

});

}catch(err){

console.log("Course loading error",err);

}

}

loadCourses();

/* ADD QUESTION */

async function addQuestion(){

const data={
course:document.getElementById("courseSelect").value,
question:document.getElementById("question").value,
option1:document.getElementById("o1").value,
option2:document.getElementById("o2").value,
option3:document.getElementById("o3").value,
option4:document.getElementById("o4").value,
answer:document.getElementById("answer").value
};

await fetch(API+"/api/admin/add-final-question",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(data)
});

alert("Final quiz question added");

/* CLEAR FIELDS */

document.getElementById("question").value="";
document.getElementById("o1").value="";
document.getElementById("o2").value="";
document.getElementById("o3").value="";
document.getElementById("o4").value="";
document.getElementById("answer").value="";

}

</script>

</body>
</html>
