<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillForge Settings</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
z-index:9999;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:#fff;
}

.content{
flex:1;
padding:40px;
overflow:auto;
}

.settings-card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
margin-bottom:25px;
max-width:600px;
}

.settings-card h3{
margin-bottom:15px;
}

.settings-card p{
margin-bottom:10px;
}

.btn{
background:#6c7cff;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.danger{
background:#ff4d4d;
}

textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:10px;
}

</style>

</head>

<body>

<div id="loading" class="loading">Loading settings...</div>

<div class="container">

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-4-line"></i>
</button>

<button onclick="location.href='courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='adaptive-test.html'">
<i class="ri-brain-line"></i>
</button>

<button onclick="location.href='performance.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='files.html'">
<i class="ri-file-text-line"></i>
</button>

<button onclick="location.href='certificates.html'">
<i class="ri-award-line"></i>
</button>

<button onclick="location.href='messages.html'">
<i class="ri-message-2-line"></i>
</button>

<button class="active">
<i class="ri-settings-3-line"></i>
</button>

</div>

<div class="content">

<h1 style="margin-bottom:30px;">Settings</h1>

<div class="settings-card">

<h3>Account Information</h3>

<p><b>Email:</b> <span id="userEmail">Loading...</span></p>

<p><b>Username:</b> <span id="username">Loading...</span></p>

<button class="btn" onclick="location.href='profile.html'">
Edit Profile
</button>

</div>

<div class="settings-card">

<h3>Theme</h3>

<p>Switch between light and dark theme</p>

<button class="btn" onclick="toggleTheme()">
Toggle Theme
</button>

</div>

<div class="settings-card">

<h3>Send Feedback</h3>

<p>Tell us how we can improve SkillForge.</p>

<textarea id="feedbackText" rows="4" placeholder="Write your feedback here..."></textarea>

<button class="btn" onclick="sendFeedback()">Submit Feedback</button>

</div>

<div class="settings-card">

<h3>Account Actions</h3>

<button class="btn danger" onclick="deleteAccount()">
Delete Account
</button>

<button class="btn" style="margin-left:10px;" onclick="logout()">
Logout
</button>

</div>

</div>

</div>

<script>

const token = localStorage.getItem("token");
const userId = localStorage.getItem("userId");

if(!token){
window.location.href="login.html";
}

/* LOAD USER INFO */

async function loadUser(){

const res = await fetch("http://localhost:5000/api/profile",{
headers:{Authorization:"Bearer "+token}
});

const data = await res.json();

document.getElementById("userEmail").innerText = data.email;
document.getElementById("username").innerText = data.username || "Not set";

}

/* THEME SYSTEM */

function toggleTheme(){

const theme = localStorage.getItem("theme");

if(theme==="dark"){
localStorage.setItem("theme","light");
}else{
localStorage.setItem("theme","dark");
}

location.reload();

}

/* APPLY THEME */

if(localStorage.getItem("theme")==="dark"){

document.body.style.background="#111";
document.body.style.color="white";

}

/* SEND FEEDBACK */

async function sendFeedback(){

const text = document.getElementById("feedbackText").value;

if(!text){
alert("Please write feedback");
return;
}

await fetch("http://localhost:5000/api/feedback",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({feedback:text})

});

alert("Feedback submitted");

document.getElementById("feedbackText").value="";

}

/* LOGOUT */

function logout(){

localStorage.clear();

window.location.href="login.html";

}

/* DELETE ACCOUNT */

async function deleteAccount(){

if(!confirm("Are you sure you want to delete your account?")) return;

await fetch("http://localhost:5000/api/delete-account",{

method:"POST",

headers:{
Authorization:"Bearer "+token
}

});

localStorage.clear();

window.location.href="signup.html";

}

/* INIT */

loadUser();

document.getElementById("loading").style.display="none";

</script>

</body>
</html>
