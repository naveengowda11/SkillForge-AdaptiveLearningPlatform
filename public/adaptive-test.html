<!DOCTYPE html>
<html>
<head>

<title>Adaptive Tests</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:white;
}

/* CONTENT */

.content{
flex:1;
padding:40px;
overflow:auto;
}

.course-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.course-card{
background:white;
padding:25px;
border-radius:18px;
cursor:pointer;
transition:all .2s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

.course-card:hover{
transform:translateY(-3px);
box-shadow:0 8px 18px rgba(0,0,0,0.1);
}

.course-title{
font-size:18px;
font-weight:600;
margin-bottom:10px;
}

.start-btn{
margin-top:10px;
background:linear-gradient(135deg,#6c7cff,#5a67ff);
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-line"></i>
</button>

<button class="active">
<i class="ri-question-line"></i>
</button>

</div>

<!-- CONTENT -->

<div class="content">

<h1>Adaptive Tests</h1>

<div id="courses" class="course-grid"></div>

</div>

</div>

<script>

const API="http://localhost:5000";

async function loadAdaptiveTests(){

try{

const res = await fetch(API+"/api/adaptive-tests");

const tests = await res.json();

const container = document.getElementById("courses");

tests.forEach(test=>{

container.innerHTML += `
<div class="course-card">

<div class="course-title">${test.course}</div>

<p>${test.question_count} Questions Available</p>

<button class="start-btn"
onclick="startTest('${test.course}')">
Start Test
</button>

</div>
`;

});

}catch(err){

console.log("Adaptive tests load error",err);

}

}

function startTest(course){

location.href=`adaptive-test-player.html?course=${course}`;

}

loadAdaptiveTests();

</script>

</body>
</html>
