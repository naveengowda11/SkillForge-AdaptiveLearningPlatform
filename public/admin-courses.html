<!DOCTYPE html>
<html>
<head>
<title>Manage Courses</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
}

.content{
flex:1;
padding:30px;
overflow:auto;
}

.card{
background:white;
padding:20px;
border-radius:18px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

button.add{
background:#6c7cff;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.course{
display:flex;
justify-content:space-between;
background:#eef1ff;
padding:12px;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='admin-dashboard.html'">
<i class="ri-dashboard-line"></i>
</button>

<button class="active">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='admin-quiz.html'">
<i class="ri-question-line"></i>
</button>

<button onclick="location.href='admin-feedback.html'">
<i class="ri-chat-3-line"></i>
</button>

</div>

<div class="content">

<h1>Manage Courses</h1>

<div class="card">

<h3>Add Course</h3>

<input id="title" placeholder="Course Title">
<textarea id="description" placeholder="Course Description"></textarea>
<input id="category" placeholder="Category">

<button class="add" onclick="addCourse()">Add Course</button>

</div>

<div class="card">

<h3>Courses</h3>

<div id="courseList"></div>

</div>

</div>

</div>

<script>

async function loadCourses(){

const res = await fetch("http://localhost:5000/api/admin/courses");
const courses = await res.json();

const list = document.getElementById("courseList");
list.innerHTML="";

courses.forEach(c=>{

list.innerHTML+=`
<div class="course">
${c.title}
<button onclick="deleteCourse(${c.id})">Delete</button>
</div>
`;

});

}

async function addCourse(){

const title = document.getElementById("title").value;
const description = document.getElementById("description").value;
const category = document.getElementById("category").value;

await fetch("http://localhost:5000/api/admin/add-course",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({title,description,category})
});

loadCourses();

}

async function deleteCourse(id){

await fetch(`http://localhost:5000/api/admin/course/${id}`,{
method:"DELETE"
});

loadCourses();

}

loadCourses();

</script>

</body>
</html>
