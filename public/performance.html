<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillForge Performance</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#e6edf6;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
margin-bottom:25px;
}

.grid3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

h3{
margin-bottom:10px;
}

.small{
font-size:14px;
color:#777;
}

.exercise{
display:flex;
justify-content:space-between;
margin:15px 0;
}

.circle{
width:220px;
margin:auto;
}

</style>
</head>

<body>

<div class="container">

<div class="grid">

<div class="card">
<h3>Learning Overview</h3>
<p class="small">Tracks your progress</p>

<canvas id="progressChart"></canvas>

</div>

<div class="card">

<h3>Average Performance</h3>
<p class="small">Your overall score</p>

<div class="circle">
<canvas id="averageChart"></canvas>
</div>

</div>

</div>


<div class="grid3">

<div class="card">

<h3>Skill Developed</h3>

<canvas id="skillChart"></canvas>

</div>

<div class="card">

<h3>Study Time</h3>

<canvas id="studyChart"></canvas>

</div>

<div class="card">

<h3>Exercise</h3>

<div class="exercise">
<span>Machine Learning</span>
<span id="mlScore">-</span>
</div>

<div class="exercise">
<span>Deep Learning</span>
<span id="dlScore">-</span>
</div>

<div class="exercise">
<span>NLP</span>
<span id="nlpScore">-</span>
</div>

<div class="exercise">
<span>Math</span>
<span id="mathScore">-</span>
</div>

<div class="exercise">
<span>Coding</span>
<span id="codingScore">-</span>
</div>

</div>

</div>

</div>

<script>

const token = localStorage.getItem("token");

async function loadPerformance(){

const res = await fetch("http://localhost:5000/api/performance",{
headers:{ Authorization:"Bearer "+token }
});

const data = await res.json();

const scores = data.map(x => (x.score/x.total)*100);

const labels = data.map((x,i)=> "Test "+(i+1));

/* Progress Line Chart */

new Chart(document.getElementById("progressChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Score %",
data:scores,
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
tension:0.4
}]
}
});

/* Average Performance */

const avg = scores.reduce((a,b)=>a+b,0)/scores.length;

new Chart(document.getElementById("averageChart"),{
type:"doughnut",
data:{
datasets:[{
data:[avg,100-avg],
backgroundColor:["#3b82f6","#e5e7eb"]
}]
},
options:{
cutout:"70%"
}
});

/* Radar Skills */

const domains={
ML:0,
DL:0,
NLP:0,
Math:0,
Coding:0
};

data.forEach(r=>{
domains[r.weakest_domain]++;
});

new Chart(document.getElementById("skillChart"),{
type:"radar",
data:{
labels:Object.keys(domains),
datasets:[{
label:"Weak Areas",
data:Object.values(domains),
backgroundColor:"rgba(59,130,246,0.2)",
borderColor:"#3b82f6"
}]
}
});

/* Study Time Dummy Chart */

new Chart(document.getElementById("studyChart"),{
type:"bar",
data:{
labels:["Mon","Tue","Wed","Thu","Fri"],
datasets:[{
data:[2,3,4,3,5],
backgroundColor:"#22c55e"
}]
}
});

}

loadPerformance();

</script>

</body>
</html>
