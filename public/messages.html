<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillForge Messages</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
z-index:9999;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:white;
}

.content{
flex:1;
display:flex;
}

.conversations{
width:280px;
background:#fff;
border-right:1px solid #eee;
padding:20px;
overflow:auto;
}

.chat-user{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.chat-user:hover{
background:#f1f2f7;
}

.chat-user img{
width:35px;
height:35px;
border-radius:50%;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
}

.chat-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.chat-header img{
width:40px;
height:40px;
border-radius:50%;
}

.messages{
flex:1;
overflow:auto;
}

.message{
background:#e9ecff;
padding:10px 14px;
border-radius:12px;
margin-bottom:10px;
width:fit-content;
}

.message.me{
background:#6c7cff;
color:white;
margin-left:auto;
}

.chat-input{
display:flex;
gap:10px;
margin-top:10px;
}

.chat-input input{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

.chat-input button{
padding:10px 16px;
border:none;
background:#6c7cff;
color:white;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="loading" class="loading">Loading messages...</div>

<div class="container">

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-4-line"></i>
</button>

<button onclick="location.href='courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='adaptive-test.html'">
<i class="ri-brain-line"></i>
</button>

<button onclick="location.href='performance.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='files.html'">
<i class="ri-file-text-line"></i>
</button>

<button onclick="location.href='certificates.html'">
<i class="ri-award-line"></i>
</button>

<button class="active">
<i class="ri-message-2-line"></i>
</button>

<button onclick="location.href='settings.html'">
<i class="ri-settings-3-line"></i>
</button>

</div>

<div class="content">

<div class="conversations">

<h2>Messages</h2>

<div id="friendsList"></div>

</div>

<div class="chat">

<div class="chat-header">

<img src="assets/profile.jpg">

<h3 id="chatName">Select a friend</h3>

</div>

<div class="messages" id="messagesBox"></div>

<div class="chat-input">

<input id="messageInput" placeholder="Type a message...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

</div>

</div>

<script>

const token = localStorage.getItem("token");
const userId = localStorage.getItem("userId");

if(!token){
window.location.href="login.html";
}

let currentFriend=null;

/* LOAD FRIENDS */

async function loadFriends(){

const res = await fetch("http://localhost:5000/api/friends/"+userId);

const friends = await res.json();

const container = document.getElementById("friendsList");

container.innerHTML="";

friends.forEach(f=>{

const div = document.createElement("div");

div.className="chat-user";

div.innerHTML=`
<img src="assets/u1.jpg">
<span>${f.username || f.name}</span>
`;

div.onclick=()=>openChat(f.user_id,f.username || f.name);

container.appendChild(div);

});

}

/* OPEN CHAT */

async function openChat(friendId,name){

currentFriend = friendId;

document.getElementById("chatName").innerText=name;

loadMessages();

}

/* LOAD MESSAGES */

async function loadMessages(){

if(!currentFriend) return;

const res = await fetch(
"http://localhost:5000/api/messages/"+userId+"/"+currentFriend
);

const data = await res.json();

const box = document.getElementById("messagesBox");

box.innerHTML="";

data.forEach(m=>{

const div = document.createElement("div");

div.className = "message"+(m.sender==userId?" me":"");

div.innerText=m.message;

box.appendChild(div);

});

box.scrollTop=box.scrollHeight;

}

/* SEND MESSAGE */

async function sendMessage(){

const input = document.getElementById("messageInput");

const text = input.value.trim();

if(!text || !currentFriend) return;

await fetch("http://localhost:5000/api/send-message",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({
sender:userId,
receiver:currentFriend,
message:text
})

});

input.value="";

loadMessages();

}

/* AUTO REFRESH */

setInterval(loadMessages,2000);

/* INIT */

loadFriends();

document.getElementById("loading").style.display="none";

</script>

</body>
</html>
