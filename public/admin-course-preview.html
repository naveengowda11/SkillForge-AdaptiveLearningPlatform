<!DOCTYPE html>
<html>
<head>

<title>Course Preview</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.sidebar button i{
font-size:20px;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
overflow:auto;
}

.header{
margin-bottom:20px;
}

.header h2{
margin-bottom:10px;
}

.category{
color:#777;
margin-bottom:20px;
}

/* VIDEO */

.video{
width:100%;
height:380px;
background:#000;
border-radius:12px;
margin-bottom:20px;
}

video{
width:100%;
height:100%;
border-radius:12px;
}

/* MODULE */

.module{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:12px;
}

.module h4{
margin-bottom:8px;
}

.lesson{
font-size:14px;
color:#555;
margin-left:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='admin-dashboard.html'">
<i class="ri-dashboard-line"></i>
</button>

<button onclick="location.href='admin-course-library.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='admin-quiz.html'">
<i class="ri-question-line"></i>
</button>

<button onclick="location.href='admin-feedback.html'">
<i class="ri-chat-3-line"></i>
</button>

<button onclick="location.href='admin-analytics.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='admin-users.html'">
<i class="ri-group-line"></i>
</button>

</div>

<div class="content">

<div class="header">

<h2 id="title"></h2>

<p id="description"></p>

<div class="category" id="category"></div>

</div>

<div class="video">

<video id="videoPlayer" controls></video>

</div>

<h3>Course Modules</h3>

<div id="modules"></div>

</div>

</div>

<script>

/* GET COURSE ID */

const params=new URLSearchParams(window.location.search);

const id=params.get("id");

/* LOAD COURSE */

async function loadCourse(){

const res=await fetch(`http://localhost:5000/api/course/${id}`);

const data=await res.json();

/* BASIC INFO */

document.getElementById("title").innerText=data.title;

document.getElementById("description").innerText=data.description;

document.getElementById("category").innerText=data.category;

/* VIDEO */

if(data.video){

document.getElementById("videoPlayer").src=
"http://localhost:5000/"+data.video;

}

/* MODULES */

const container=document.getElementById("modules");

container.innerHTML="";

if(data.modules){

const modules=JSON.parse(data.modules);

modules.forEach(m=>{

let html=`
<div class="module">
<h4>${m.title}</h4>
`;

m.lessons.forEach(l=>{

html+=`<div class="lesson">• ${l.title}</div>`;

});

html+="</div>";

container.innerHTML+=html;

});

}

}

loadCourse();

</script>

</body>
</html>
