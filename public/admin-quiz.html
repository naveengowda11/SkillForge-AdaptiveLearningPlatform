<!DOCTYPE html>
<html>
<head>
<title>Quiz Manager</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
}

.content{
flex:1;
padding:30px;
overflow:auto;
}

.card{
background:white;
padding:20px;
border-radius:18px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#6c7cff;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.question{
background:#eef1ff;
padding:12px;
border-radius:10px;
margin-top:10px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='admin-dashboard.html'">
<i class="ri-dashboard-line"></i>
</button>

<button onclick="location.href='admin-courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button class="active">
<i class="ri-question-line"></i>
</button>

<button onclick="location.href='admin-feedback.html'">
<i class="ri-chat-3-line"></i>
</button>

</div>

<div class="content">

<h1>Quiz Manager</h1>

<div class="card">

<input id="course" placeholder="Course Name">

<input id="question" placeholder="Question">

<input id="o1" placeholder="Option 1">
<input id="o2" placeholder="Option 2">
<input id="o3" placeholder="Option 3">
<input id="o4" placeholder="Option 4">

<input id="answer" placeholder="Correct option number (1-4)">

<button onclick="addQuestion()">Add Question</button>

</div>

<div class="card">

<h3>Course Questions</h3>

<button onclick="loadQuestions()">Load Questions</button>

<div id="questionList"></div>

</div>

</div>

</div>

<script>

/* ================= ADD QUESTION ================= */

async function addQuestion(){

const course=document.getElementById("course").value;
const question=document.getElementById("question").value;

const option1=document.getElementById("o1").value;
const option2=document.getElementById("o2").value;
const option3=document.getElementById("o3").value;
const option4=document.getElementById("o4").value;

const answer=document.getElementById("answer").value;

if(!course || !question){
alert("Enter course and question");
return;
}

const data={
course,
question,
option1,
option2,
option3,
option4,
answer
};

await fetch(
"http://localhost:5000/api/admin/add-question",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
}
);

alert("Question added");

clearForm();

loadQuestions();

}

/* ================= LOAD QUESTIONS ================= */

async function loadQuestions(){

const course=document.getElementById("course").value;

if(!course){
alert("Enter course name first");
return;
}

const res=await fetch(
`http://localhost:5000/api/admin/questions/${course}`
);

const questions=await res.json();

const container=document.getElementById("questionList");

container.innerHTML="";

questions.forEach(q=>{

container.innerHTML+=`

<div class="question">

<div>

<b>${q.question}</b>

<br>

1) ${q.option1}
<br>

2) ${q.option2}
<br>

3) ${q.option3}
<br>

4) ${q.option4}

<br>

<b>Answer: ${q.answer}</b>

</div>

<button onclick="deleteQuestion(${q.id})">
Delete
</button>

</div>

`;

});

}

/* ================= DELETE QUESTION ================= */

async function deleteQuestion(id){

if(!confirm("Delete this question?")) return;

await fetch(
`http://localhost:5000/api/admin/question/${id}`,
{
method:"DELETE"
}
);

loadQuestions();

}

/* ================= CLEAR FORM ================= */

function clearForm(){

document.getElementById("question").value="";
document.getElementById("o1").value="";
document.getElementById("o2").value="";
document.getElementById("o3").value="";
document.getElementById("o4").value="";
document.getElementById("answer").value="";

}

</script>

</body>
</html>
