<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillForge Leaderboard</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:#fff;
}

/* CONTENT */

.content{
flex:1;
padding:40px;
overflow:auto;
}

.leaderboard-card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
max-width:700px;
}

/* USER ROW */

.user{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
border-radius:12px;
margin-bottom:10px;
background:#f3f4ff;
}

.user-left{
display:flex;
align-items:center;
gap:12px;
}

.user img{
width:40px;
height:40px;
border-radius:50%;
}

.rank{
font-weight:bold;
font-size:18px;
width:30px;
}

.score{
font-weight:bold;
color:#6c7cff;
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-4-line"></i>
</button>

<button onclick="location.href='courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='adaptive-test.html'">
<i class="ri-brain-line"></i>
</button>

<button onclick="location.href='performance.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='files.html'">
<i class="ri-file-text-line"></i>
</button>

<button onclick="location.href='certificates.html'">
<i class="ri-award-line"></i>
</button>

<button onclick="location.href='messages.html'">
<i class="ri-message-2-line"></i>
</button>

<button onclick="location.href='settings.html'">
<i class="ri-settings-3-line"></i>
</button>

<button class="active">
<i class="ri-trophy-line"></i>
</button>

</div>

<!-- CONTENT -->

<div class="content">

<h1 style="margin-bottom:25px;">Leaderboard</h1>

<div class="leaderboard-card">

<h3 style="margin-bottom:20px;">Friends Score Ranking</h3>

<div class="user">

<div class="user-left">
<div class="rank">1</div>
<img src="assets/u1.jpg">
<span>Anna Morgan</span>
</div>

<div class="score">10568</div>

</div>

<div class="user">

<div class="user-left">
<div class="rank">2</div>
<img src="assets/u2.jpg">
<span>Jake Thompson</span>
</div>

<div class="score">10234</div>

</div>

<div class="user">

<div class="user-left">
<div class="rank">3</div>
<img src="assets/u3.jpg">
<span>Sofia Bennett</span>
</div>

<div class="score">9892</div>

</div>

<div class="user">

<div class="user-left">
<div class="rank">4</div>
<img src="assets/u4.jpg">
<span>Emily Carter</span>
</div>

<div class="score">9322</div>

</div>

<div class="user">

<div class="user-left">
<div class="rank">5</div>
<img src="assets/profile.jpg">
<span>You</span>
</div>

<div class="score">8700</div>

</div>

</div>

</div>

</div>

</body>
</html>
