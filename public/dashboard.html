<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillForge Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
z-index:9999;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:white;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
overflow:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.navlinks{
display:flex;
gap:20px;
}

.navlinks a{
text-decoration:none;
color:#444;
padding:8px 16px;
border-radius:10px;
}

.navlinks a.active{
background:#111;
color:#fff;
}

.grid{
display:grid;
grid-template-columns:1fr 2fr;
gap:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.course{
padding:16px;
border-radius:16px;
margin-top:15px;
cursor:pointer;
}

.c1{background:#cfd3ff;}
.c2{background:#b8d3e6;}
.c3{background:#c6e2c6;}

.lower{
margin-top:20px;
display:grid;
grid-template-columns:1fr;
gap:20px;
}

.friend{
display:flex;
justify-content:space-between;
margin:12px 0;
}

.friend-left{
display:flex;
align-items:center;
gap:10px;
}

.friend img{
width:32px;
height:32px;
border-radius:50%;
}

</style>

</head>

<body>

<div id="loading" class="loading">Loading dashboard...</div>

<div class="container">

<div class="sidebar">

<button class="active"><i class="ri-home-4-line"></i></button>

<button onclick="location.href='courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='adaptive-test.html'">
<i class="ri-brain-line"></i>
</button>

<button onclick="location.href='performance.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='files.html'">
<i class="ri-file-text-line"></i>
</button>

<button onclick="location.href='certificates.html'">
<i class="ri-award-line"></i>
</button>

<button onclick="location.href='messages.html'">
<i class="ri-message-2-line"></i>
</button>

<button onclick="location.href='notifications.html'">
<i class="ri-notification-3-line"></i>
</button>

<button onclick="location.href='leaderboard.html'">
<i class="ri-trophy-line"></i>
</button>

<button onclick="location.href='settings.html'">
<i class="ri-settings-3-line"></i>
</button>

</div>

<div class="content">

<div class="topbar">

<div class="navlinks">
<a class="active">Dashboard</a>
<a href="performance.html">Progress</a>
<a href="courses.html">Courses</a>
</div>

<div style="display:flex;align-items:center;gap:15px">

<input id="searchUser" placeholder="Search users..."
style="padding:8px 12px;border-radius:8px;border:1px solid #ddd;width:200px">

<button onclick="location.href='notifications.html'" style="background:none;border:none">
<i class="ri-notification-3-line" style="font-size:22px;color:#444"></i>
</button>

<img src="assets/profile.jpg"
onclick="location.href='profile.html'"
style="width:40px;height:40px;border-radius:50%;cursor:pointer">

</div>

</div>

<h1 id="welcomeText" style="margin-bottom:20px">Dashboard</h1>

<div class="grid">

<div class="card">

<h3>Select a course</h3>

<div id="dashboardCourses"></div>

</div>

<div class="card">

<h3>Performance Chart</h3>

<canvas id="chart"></canvas>
<p id="noData" style="display:none;color:#777">No performance data yet</p>

</div>

</div>

<div class="lower">

<div class="card">

<h3 style="display:flex;justify-content:space-between">
Friends Score
<a href="leaderboard.html" style="font-size:14px">View All</a>
</h3>

<div id="friendsList"></div>

</div>

</div>

</div>

</div>

<script>

const token = localStorage.getItem("token");
const userId = localStorage.getItem("userId");

if(!token){
window.location.href="login.html";
}

/* Welcome */

const name = localStorage.getItem("name") || "Learner";
document.getElementById("welcomeText").innerText = "Welcome back, " + name;


/* USER SEARCH */

document.getElementById("searchUser").addEventListener("keypress", async function(e){

if(e.key==="Enter"){

const query=this.value.trim();

if(!query) return;

try{

const res = await fetch("http://localhost:5000/api/search-users?q="+query);
const users = await res.json();

if(users.length===0){
alert("User not found");
return;
}

window.location.href="profile.html?userId="+users[0].id;

}catch(err){

alert("Search failed");

}

}

});


/* PERFORMANCE */

let performanceChart = null;

async function loadPerformance(){

try{

const res = await fetch("http://localhost:5000/api/performance",{
headers:{Authorization:"Bearer "+token}
});

const data = await res.json();

if(!data || data.length===0){
document.getElementById("noData").style.display="block";
return;
}

const scores = data.map(x=>x.score);
const labels = data.map(x=>x.date.slice(0,10));

const ctx = document.getElementById("chart");

if(performanceChart){
performanceChart.destroy();
}

performanceChart = new Chart(ctx,{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Performance",
data:scores,
borderColor:"#6c7cff",
backgroundColor:"rgba(108,124,255,0.2)",
tension:0.4,
fill:true
}]
},

options:{
responsive:true,
plugins:{legend:{display:false}}
}

});

}catch(err){

console.log("Performance load failed");

}

}


/* FRIENDS */

async function loadFriends(){

try{

const res = await fetch("http://localhost:5000/api/friends/"+userId);
const friends = await res.json();

const container = document.getElementById("friendsList");

container.innerHTML="";

if(!friends || friends.length===0){

container.innerHTML="<p style='color:#777'>No friends yet</p>";

return;

}

friends.forEach(f=>{

container.innerHTML += `
<div class="friend">

<div class="friend-left">
<img src="assets/u1.jpg">
${f.name}
</div>

<span>Friend</span>

</div>
`;

});

}catch(err){

console.log("Friends load failed");

}

}


/* DASHBOARD COURSES */

async function loadDashboardCourses(){

try{

const res = await fetch("http://localhost:5000/api/admin/courses");

const courses = await res.json();

const container = document.getElementById("dashboardCourses");

container.innerHTML = "";

if(!courses || courses.length===0){

container.innerHTML = "<p style='color:#777'>No courses available</p>";

return;

}

/* show latest 3 courses */

const latestCourses = courses.slice(-3).reverse();

latestCourses.forEach((course,index)=>{

const colors = ["c1","c2","c3"];

container.innerHTML += `
<div class="course ${colors[index]}" onclick="openCourse('${course.title}')">

<h3>${course.title}</h3>

<p>${course.description}</p>

</div>
`;

});

}catch(err){

console.log("Course loading failed");

}

}


function openCourse(course){

localStorage.setItem("selectedCourse",course);

window.location.href="course-player.html";

}
/* ================= RECOMMENDED COURSES ================= */

async function loadRecommendations(){

const userId = localStorage.getItem("userId");

try{

const res = await fetch(
`http://localhost:5000/api/recommendations/${userId}`
);

const courses = await res.json();

const container =
document.getElementById("recommendedCourses");

container.innerHTML="";

if(!courses || courses.length===0){

container.innerHTML=
"<p style='color:#777'>No recommendations yet.</p>";

return;

}

courses.slice(0,3).forEach(c=>{

container.innerHTML+=`

<div class="course-card">

<h3>${c.title}</h3>

<p>${c.description}</p>

<button onclick="openCourse('${c.title}')">
Start Learning
</button>

</div>

`;

});

}catch(err){

console.log("Recommendation error");

}

}

/* INIT */

async function init(){

await loadPerformance();

await loadFriends();

await loadDashboardCourses();

document.getElementById("loading").style.display="none";

await loadRecommendations();

}

init();

</script>

</body>
</html>
