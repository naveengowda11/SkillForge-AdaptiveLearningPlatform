<!DOCTYPE html>
<html>
<head>

<title>Admin Course Library</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.sidebar button i{
font-size:20px;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
overflow:auto;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.search{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
width:250px;
}

/* COURSE GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.course-card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
gap:10px;
}

.course-card h3{
font-size:18px;
}

.category{
font-size:12px;
color:#777;
}

.buttons{
margin-top:auto;
display:flex;
gap:10px;
}

button.action{
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
background:#6c7cff;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='admin-dashboard.html'">
<i class="ri-dashboard-line"></i>
</button>

<button onclick="location.href='admin-course-library.html'">
<i class="ri-book-2-line"></i>
</button>

<button class="active">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='admin-quiz.html'">
<i class="ri-question-line"></i>
</button>

<button onclick="location.href='admin-feedback.html'">
<i class="ri-chat-3-line"></i>
</button>

<button onclick="location.href='admin-analytics.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='admin-users.html'">
<i class="ri-group-line"></i>
</button>

</div>

<div class="content">

<div class="header">

<h2>Course Library</h2>

<input class="search" id="search" placeholder="Search course...">

</div>

<div class="grid" id="courseGrid"></div>

</div>

</div>

<script>

let courses=[];

/* LOAD COURSES */

async function loadCourses(){

const res=await fetch("http://localhost:5000/api/admin/courses");

courses=await res.json();

renderCourses(courses);

}

/* RENDER COURSES */

function renderCourses(list){

const grid=document.getElementById("courseGrid");

grid.innerHTML="";

list.forEach(course=>{

grid.innerHTML+=`

<div class="course-card">

<h3>${course.title}</h3>

<p>${course.description}</p>

<div class="category">${course.category}</div>

<div class="buttons">

<button class="action"
onclick="editCourse(${course.id})">
Edit
</button>

<button class="action"
onclick="viewCourse(${course.id})">
View
</button>

</div>

</div>

`;

});

}

/* SEARCH */

document.getElementById("search").addEventListener("input",e=>{

const value=e.target.value.toLowerCase();

const filtered=courses.filter(c=>
c.title.toLowerCase().includes(value)
);

renderCourses(filtered);

});

/* EDIT COURSE */

function editCourse(id){

window.location.href=`admin-edit-course.html?id=${id}`;

}

/* VIEW COURSE */

function viewCourse(id){

window.location.href=`admin-course-preview.html?id=${id}`;

}

loadCourses();

</script>

</body>
</html>
