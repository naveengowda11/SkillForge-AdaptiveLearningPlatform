<!DOCTYPE html>
<html>
<head>
<title>Student Feedback</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.content{
flex:1;
padding:30px;
overflow:auto;
}

.feedback{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='admin-dashboard.html'">
<i class="ri-dashboard-line"></i>
</button>

<button onclick="location.href='admin-courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='admin-quiz.html'">
<i class="ri-question-line"></i>
</button>

<button class="active">
<i class="ri-chat-3-line"></i>
</button>

</div>

<div class="content">

<h1>Student Feedback</h1>

<div id="feedbackList"></div>

</div>

</div>

<script>

async function loadFeedback(){

const res = await fetch("http://localhost:5000/api/admin/feedback");
const data = await res.json();

const list = document.getElementById("feedbackList");

data.forEach(f=>{

list.innerHTML+=`
<div class="feedback">
<b>${f.name}</b> (${f.course})
<p>${f.message}</p>
</div>
`;

});

}

loadFeedback();

</script>

</body>
</html>
