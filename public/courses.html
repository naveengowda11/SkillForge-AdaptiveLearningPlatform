<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillForge Courses</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:white;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
overflow:auto;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.search{
padding:8px 12px;
border-radius:8px;
border:1px solid #ddd;
width:250px;
}

/* GRID */

.course-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
}

/* COURSE CARD */

.course-card{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
cursor:pointer;
transition:0.2s;
}

.course-card:hover{
transform:translateY(-4px);
}

.course-title{
font-size:18px;
margin-bottom:8px;
}

.course-desc{
font-size:14px;
color:#666;
margin-bottom:15px;
}

.course-info{
font-size:13px;
color:#777;
}

.tag{
display:inline-block;
background:#eef1ff;
padding:4px 10px;
border-radius:8px;
font-size:12px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-4-line"></i>
</button>

<button class="active">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='adaptive-test.html'">
<i class="ri-brain-line"></i>
</button>

<button onclick="location.href='performance.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='files.html'">
<i class="ri-file-text-line"></i>
</button>

<button onclick="location.href='certificates.html'">
<i class="ri-award-line"></i>
</button>

<button onclick="location.href='messages.html'">
<i class="ri-message-2-line"></i>
</button>

<button onclick="location.href='notifications.html'">
<i class="ri-notification-3-line"></i>
</button>

<button onclick="location.href='leaderboard.html'">
<i class="ri-trophy-line"></i>
</button>

<button onclick="location.href='settings.html'">
<i class="ri-settings-3-line"></i>
</button>

</div>

<!-- MAIN CONTENT -->

<div class="content">

<div class="header">

<h1>Explore Courses</h1>

<input 
class="search" 
id="courseSearch"
placeholder="Search courses..."
>

<p id="noResults" style="display:none;color:#777;margin-top:10px">
No courses found
</p>

</div>

<div class="course-grid" id="courseGrid">
</div>

</div>

</div>


<script>

/* SEARCH FUNCTION */

const searchInput = document.getElementById("courseSearch");
const noResults = document.getElementById("noResults");

searchInput.addEventListener("input", function(){

const value = searchInput.value.toLowerCase();
const courses = document.querySelectorAll(".course-card");

let visible = 0;

courses.forEach(course => {

const title = course.innerText.toLowerCase();

if(title.includes(value)){
course.style.display = "block";
visible++;
}else{
course.style.display = "none";
}

});

if(visible === 0){
noResults.style.display = "block";
}else{
noResults.style.display = "none";
}

});


/* LOAD COURSES FROM DATABASE */

async function loadCourses(){

try{

const res = await fetch("http://localhost:5000/api/admin/courses");

const courses = await res.json();

const grid = document.getElementById("courseGrid");

grid.innerHTML="";

courses.forEach(c=>{

const card = document.createElement("div");

card.className="course-card";

card.innerHTML = `
<span class="tag">${c.category}</span>

<div class="course-title">${c.title}</div>

<div class="course-desc">${c.description}</div>

<div class="course-info">Duration: 5 Weeks</div>
`;

card.onclick = function(){

localStorage.setItem("selectedCourse",c.title);

window.location.href="course-player.html";

};

grid.appendChild(card);

});

}catch(err){

console.log("Error loading courses",err);

}

}

loadCourses();

</script>

</body>
</html>
