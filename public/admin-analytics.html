<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SkillForge Admin Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:white;
}

.content{
flex:1;
padding:30px;
overflow:auto;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#fff;
padding:25px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.card h3{
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='admin-dashboard.html'">
<i class="ri-dashboard-line"></i>
</button>

<button onclick="location.href='admin-courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='admin-quiz.html'">
<i class="ri-question-line"></i>
</button>

<button onclick="location.href='admin-feedback.html'">
<i class="ri-chat-3-line"></i>
</button>

<button class="active">
<i class="ri-bar-chart-line"></i>
</button>

</div>

<div class="content">

<h1 style="margin-bottom:25px;">Admin Analytics</h1>

<div class="grid">

<div class="card">
<h3>Student Growth</h3>
<canvas id="userChart"></canvas>
</div>

<div class="card">
<h3>Course Popularity</h3>
<canvas id="courseChart"></canvas>
</div>

<div class="card">
<h3>Test Performance Trend</h3>
<canvas id="testChart"></canvas>
</div>

<div class="card">
<h3>Most Popular Course</h3>
<h2 id="popularCourse">Loading...</h2>
</div>

</div>

</div>

</div>

<script>

/* ================= STUDENT GROWTH ================= */

async function loadUsers(){

try{

const res=await fetch("http://localhost:5000/api/admin/analytics/users");
const data=await res.json();

if(!data || data.length===0) return;

const labels=data.map(x=>x.month);
const counts=data.map(x=>x.count);

new Chart(document.getElementById("userChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"New Users",
data:counts,
borderColor:"#6c7cff",
backgroundColor:"rgba(108,124,255,0.2)",
tension:0.4,
fill:true
}]
},
options:{
responsive:true,
plugins:{legend:{display:false}}
}
});

}catch(err){

console.error("User analytics error",err);

}

}


/* ================= COURSE POPULARITY ================= */

async function loadCourses(){

try{

const res=await fetch("http://localhost:5000/api/admin/analytics/courses");
const data=await res.json();

if(!data || data.length===0){

document.getElementById("popularCourse").innerText="No Data";

return;

}

const labels=data.map(x=>x.course);
const counts=data.map(x=>x.students);

document.getElementById("popularCourse").innerText=labels[0];

new Chart(document.getElementById("courseChart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Students Enrolled",
data:counts,
backgroundColor:"#6c7cff"
}]
},

options:{
responsive:true,
plugins:{legend:{display:false}}
}

});

}catch(err){

console.error("Course analytics error",err);
document.getElementById("popularCourse").innerText="Error";

}

}


/* ================= TEST PERFORMANCE ================= */

async function loadTests(){

try{

const res=await fetch("http://localhost:5000/api/admin/analytics/tests");

const data=await res.json();

if(!data || data.length===0) return;

const labels=data.map(x=>x.date.substring(0,10));
const scores=data.map(x=>x.percentage);

new Chart(document.getElementById("testChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Average %",
data:scores,
borderColor:"#ff6384",
backgroundColor:"rgba(255,99,132,0.2)",
tension:0.4,
fill:true
}]
},

options:{
responsive:true,
plugins:{legend:{display:false}}
}

});

}catch(err){

console.error("Test analytics error",err);

}

}


/* ================= INIT ================= */

loadUsers();
loadCourses();
loadTests();

</script>

</body>
</html>
