<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillForge Certificates</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.sidebar button i{font-size:20px;color:#444;}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:white;
}

.content{
flex:1;
padding:30px;
overflow:auto;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
margin-bottom:20px;
}

.cert-buttons{
margin-top:10px;
display:flex;
gap:10px;
}

.cert-buttons button{
padding:8px 14px;
border:none;
background:#6c7cff;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-4-line"></i>
</button>

<button onclick="location.href='courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='adaptive-test.html'">
<i class="ri-brain-line"></i>
</button>

<button onclick="location.href='performance.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='files.html'">
<i class="ri-file-text-line"></i>
</button>

<button class="active">
<i class="ri-award-line"></i>
</button>

<button onclick="location.href='messages.html'">
<i class="ri-message-2-line"></i>
</button>

<button onclick="location.href='settings.html'">
<i class="ri-settings-3-line"></i>
</button>

</div>

<div class="content">

<h1 style="margin-bottom:20px;">Your Certificates</h1>

<div class="card">

<h3>Machine Learning Foundations</h3>

<div class="cert-buttons">
<button>View Certificate</button>
<button>Download</button>
</div>

</div>

<div class="card">

<h3>Deep Learning Basics</h3>

<div class="cert-buttons">
<button>View Certificate</button>
<button>Download</button>
</div>

</div>

</div>

</div>

</body>
</html>
