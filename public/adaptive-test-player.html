<!DOCTYPE html>
<html>
<head>

<title>Adaptive Test</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:white;
}

/* CONTENT */

.content{
flex:1;
padding:40px;
overflow:auto;
}

.card{
background:white;
padding:30px;
border-radius:18px;
max-width:900px;
}

/* TIMER */

#timer{
font-weight:600;
margin-bottom:10px;
color:#ff4d4d;
}

/* PROGRESS BAR */

.progress-container{
width:100%;
background:#e5e7ff;
height:8px;
border-radius:10px;
margin-bottom:20px;
}

.progress-bar{
height:8px;
background:#6c7cff;
width:0%;
border-radius:10px;
transition:width .3s;
}

/* QUESTION */

.question{
font-size:18px;
font-weight:600;
margin-bottom:20px;
}

/* OPTIONS */

.option{
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.option:hover{
background:#f3f5ff;
}

.selected{
background:#e9ecff;
border-color:#6c7cff;
}

/* NAVIGATOR */

.navigator{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:20px;
}

.nav-btn{
width:35px;
height:35px;
border-radius:6px;
border:none;
background:#eef1ff;
cursor:pointer;
}

.nav-btn.active{
background:#6c7cff;
color:white;
}

/* BUTTON */

.next-btn{
margin-top:20px;
background:linear-gradient(135deg,#6c7cff,#5a67ff);
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

.result{
text-align:center;
}

.result h1{
font-size:48px;
margin:10px 0;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-line"></i>
</button>

<button class="active">
<i class="ri-question-line"></i>
</button>

</div>

<div class="content">

<h1>Adaptive Test</h1>

<div class="card">

<div id="timer">Time Left: 60s</div>

<div class="progress-container">
<div id="progressBar" class="progress-bar"></div>
</div>

<div id="questionText" class="question"></div>

<div id="options"></div>

<button class="next-btn" onclick="nextQuestion()">Next</button>

<div id="navigator" class="navigator"></div>

</div>

</div>

</div>

<script>

const API="http://localhost:5000";

const urlParams=new URLSearchParams(window.location.search);
const course=urlParams.get("course");

let questions=[];
let answers=[];
let current=0;
let score=0;

let timer;
let timeLeft=60;

/* LOAD QUIZ */

async function loadQuiz(){

const res=await fetch(`${API}/api/adaptive-test/${course}`);

questions=await res.json();

answers=new Array(questions.length).fill(null);

createNavigator();

showQuestion();

}

/* CREATE NAVIGATOR */

function createNavigator(){

const nav=document.getElementById("navigator");

nav.innerHTML="";

questions.forEach((q,i)=>{

const btn=document.createElement("button");

btn.className="nav-btn";

btn.innerText=i+1;

btn.onclick=()=>goToQuestion(i);

nav.appendChild(btn);

});

}

/* SHOW QUESTION */

function showQuestion(){

updateProgress();

highlightNavigator();

const q=questions[current];

document.getElementById("questionText").innerText=
`Q${current+1}. ${q.question}`;

const optionsDiv=document.getElementById("options");

optionsDiv.innerHTML="";

[q.option1,q.option2,q.option3,q.option4].forEach((opt,index)=>{

const div=document.createElement("div");

div.className="option";

div.innerText=opt;

div.onclick=()=>selectOption(div,index+1);

if(answers[current]===index+1){
div.classList.add("selected");
}

optionsDiv.appendChild(div);

});

startTimer();

}

/* SELECT OPTION */

function selectOption(element,value){

answers[current]=value;

document.querySelectorAll(".option").forEach(o=>{
o.classList.remove("selected");
});

element.classList.add("selected");

}

/* TIMER */

function startTimer(){

clearInterval(timer);

timeLeft=60;

document.getElementById("timer").innerText=
"Time Left: "+timeLeft+"s";

timer=setInterval(()=>{

timeLeft--;

document.getElementById("timer").innerText=
"Time Left: "+timeLeft+"s";

if(timeLeft<=0){

clearInterval(timer);

nextQuestion();

}

},1000);

}

/* NEXT QUESTION */

function nextQuestion(){

clearInterval(timer);

current++;

if(current<questions.length){

showQuestion();

}else{

finishQuiz();

}

}

/* GO TO QUESTION */

function goToQuestion(index){

clearInterval(timer);

current=index;

showQuestion();

}

/* NAVIGATOR HIGHLIGHT */

function highlightNavigator(){

const buttons=document.querySelectorAll(".nav-btn");

buttons.forEach((b,i)=>{

b.classList.remove("active");

if(i===current){
b.classList.add("active");
}

});

}

/* PROGRESS BAR */

function updateProgress(){

const progress=((current)/questions.length)*100;

document.getElementById("progressBar").style.width=
progress+"%";

}

/* SAVE RESULT */

async function saveResult(){

score=0;

questions.forEach((q,i)=>{

if(answers[i]===q.answer){
score++;
}

});

await fetch(API+"/api/save-test-result",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("token")
},
body:JSON.stringify({
course:course,
score:score,
total:questions.length,
weakest_domain:"adaptive"
})
});

}

/* FINISH QUIZ */

async function finishQuiz(){

await saveResult();

let percent=Math.round((score/questions.length)*100);

document.querySelector(".card").innerHTML=`

<div class="result">

<h2>Test Completed</h2>

<h3>Your Score</h3>

<h1>${score}/${questions.length}</h1>

<p>${percent}% Performance</p>

<button class="next-btn" onclick="location.href='dashboard.html'">
Back to Dashboard
</button>

</div>

`;

}

loadQuiz();

</script>

</body>
</html>
