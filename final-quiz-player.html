<!DOCTYPE html>
<html>
<head>

<title>Final Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:white;
}

/* CONTENT */

.content{
flex:1;
padding:40px;
overflow:auto;
}

.card{
background:white;
padding:30px;
border-radius:18px;
max-width:800px;
}

.question{
font-size:18px;
font-weight:600;
margin-bottom:20px;
}

.option{
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.option:hover{
background:#f3f5ff;
}

.selected{
background:#e9ecff;
border-color:#6c7cff;
}

.next-btn{
margin-top:20px;
background:linear-gradient(135deg,#6c7cff,#5a67ff);
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-line"></i>
</button>

<button class="active">
<i class="ri-question-line"></i>
</button>

</div>

<div class="content">

<h1>Final Quiz</h1>

<div class="card">

<div id="questionText" class="question"></div>

<div id="options"></div>

<button class="next-btn" onclick="nextQuestion()">
Next
</button>

</div>

</div>

</div>

<script>

const API="http://localhost:5000";

const urlParams = new URLSearchParams(window.location.search);
const course = urlParams.get("course");

let questions=[];
let current=0;
let score=0;
let selectedOption=null;

/* LOAD FINAL QUIZ */

async function loadQuiz(){

const res = await fetch(`${API}/api/final-quiz/${course}`);

questions = await res.json();

showQuestion();

}

/* SHOW QUESTION */

function showQuestion(){

const q = questions[current];

document.getElementById("questionText").innerText =
`Q${current+1}. ${q.question}`;

const optionsDiv = document.getElementById("options");

optionsDiv.innerHTML="";

[q.option1,q.option2,q.option3,q.option4].forEach((opt,index)=>{

const div=document.createElement("div");

div.className="option";

div.innerText=opt;

div.onclick=()=>selectOption(div,index+1);

optionsDiv.appendChild(div);

});

}

/* SELECT OPTION */

function selectOption(element,value){

selectedOption=value;

document.querySelectorAll(".option").forEach(o=>{
o.classList.remove("selected");
});

element.classList.add("selected");

}

/* NEXT QUESTION */

function nextQuestion(){

if(selectedOption===questions[current].answer){
score++;
}

selectedOption=null;

current++;

if(current<questions.length){

showQuestion();

}else{

finishQuiz();

}

}

/* FINISH QUIZ */

async function finishQuiz(){

let percent = (score/questions.length)*100;

alert(`Final Quiz Completed\nScore: ${score}/${questions.length}`);

await fetch(API+"/api/save-test-result",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
course:course,
score:score,
total:questions.length
})
});

if(percent>=60){

alert("Congratulations! Certificate unlocked.");

}else{

alert("Score below 60%. Try again.");

}

location.href="courses.html";

}

loadQuiz();

</script>

</body>
</html>
