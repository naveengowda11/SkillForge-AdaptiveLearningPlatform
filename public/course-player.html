<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SkillForge Course Player</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:#fff;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
overflow:auto;
display:flex;
gap:25px;
}

/* LEFT PANEL */

.left{
flex:2;
}

/* VIDEO */

.video-player{
background:#000;
border-radius:12px;
overflow:hidden;
}

.video-player video{
width:100%;
}

/* OUTCOMES */

.outcomes{
background:#fff;
margin-top:20px;
padding:20px;
border-radius:14px;
}

.outcomes li{
margin-top:8px;
}

/* RIGHT PANEL */

.right{
flex:1;
background:#fff;
border-radius:14px;
padding:20px;
overflow:auto;
}

/* MODULE */

.module{
margin-bottom:15px;
}

.module h3{
margin-bottom:8px;
}

/* LESSON */

.lesson{
padding:8px;
background:#eef1ff;
margin-top:6px;
border-radius:8px;
cursor:pointer;
}

.lesson:hover{
background:#dfe3ff;
}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<button onclick="location.href='dashboard.html'">
<i class="ri-home-4-line"></i>
</button>

<button onclick="location.href='courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='adaptive-test.html'">
<i class="ri-brain-line"></i>
</button>

<button onclick="location.href='performance.html'">
<i class="ri-bar-chart-line"></i>
</button>

<button onclick="location.href='certificates.html'">
<i class="ri-award-line"></i>
</button>

<button onclick="location.href='settings.html'">
<i class="ri-settings-3-line"></i>
</button>

</div>

<!-- MAIN CONTENT -->

<div class="content">

<!-- LEFT SIDE -->

<div class="left">

<h1 id="courseTitle">Course</h1>

<div class="video-player">
<video id="videoPlayer" controls></video>
</div>

<div class="outcomes">

<h3>What you will learn</h3>

<ul id="outcomeList"></ul>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="right">

<h2>Course Content</h2>

<div id="modules"></div>

</div>

</div>

</div>

<script>

const course = localStorage.getItem("selectedCourse");

if(!course){
alert("No course selected");
window.location.href="courses.html";
}

document.getElementById("courseTitle").innerText = course;

let firstVideoLoaded = false;

/* ================= LOAD OUTCOMES ================= */

async function loadOutcomes(){

try{

const res = await fetch(`http://localhost:5000/api/course-outcomes/${course}`);
const data = await res.json();

const list = document.getElementById("outcomeList");
list.innerHTML = "";

if(!data || data.length === 0){
list.innerHTML = "<li>No outcomes available</li>";
return;
}

data.forEach(o=>{
list.innerHTML += `<li>${o.outcome}</li>`;
});

}catch(err){

console.log("Outcome load failed");

}

}

/* ================= LOAD MODULES ================= */

async function loadModules(){

try{

const res = await fetch(`http://localhost:5000/api/course-modules/${course}`);
const modules = await res.json();

const box = document.getElementById("modules");
box.innerHTML = "";

if(!modules || modules.length === 0){
box.innerHTML = "<p>No modules available</p>";
return;
}

for(const m of modules){

const div = document.createElement("div");

div.className = "module";

div.innerHTML = `
<h3>${m.title}</h3>
<div id="lessons-${m.id}"></div>
`;

box.appendChild(div);

await loadLessons(m.id);

}

}catch(err){

console.log("Module load failed");

}

}

/* ================= LOAD LESSONS ================= */

async function loadLessons(moduleId){

try{

const res = await fetch(`http://localhost:5000/api/module-lessons/${moduleId}`);
const lessons = await res.json();

const box = document.getElementById(`lessons-${moduleId}`);

if(!lessons || lessons.length === 0){
box.innerHTML = "<p style='color:#777'>No lessons</p>";
return;
}

lessons.forEach((lesson,i)=>{

const div = document.createElement("div");

div.className = "lesson";
div.innerText = lesson.title;

div.onclick = () => loadVideo(lesson.video);

box.appendChild(div);

/* load only first video once */

if(!firstVideoLoaded && lesson.video){

loadVideo(lesson.video);

firstVideoLoaded = true;

}

});

}catch(err){

console.log("Lesson load failed");

}

}

/* ================= LOAD VIDEO ================= */

let completedLessons = 0;
let totalLessons = 0;

async function calculateTotalLessons(){

const res = await fetch(`http://localhost:5000/api/course-modules/${course}`);
const modules = await res.json();

totalLessons = 0;

for(const m of modules){

const r = await fetch(`http://localhost:5000/api/module-lessons/${m.id}`);
const lessons = await r.json();

totalLessons += lessons.length;

}

}

async function updateProgress(){

const token = localStorage.getItem("token");

await fetch("http://localhost:5000/api/update-progress",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
course:course,
module_completed:completedLessons,
total_modules:totalLessons
})

});

}

function loadVideo(video){

if(!video) return;

const player = document.getElementById("videoPlayer");

const cleanPath = video.replace(/\\/g,"/");

player.src = `http://localhost:5000/${cleanPath}`;

player.play();

/* detect progress */

player.onended = async () => {

completedLessons++;

await updateProgress();

};

}
/* ================= INIT ================= */

async function init(){

await calculateTotalLessons();

await loadOutcomes();

await loadModules();

}

init();

</script>

</body>
</html>
