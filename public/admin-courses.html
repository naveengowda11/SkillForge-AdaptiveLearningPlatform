<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillForge Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.sidebar button i{
font-size:20px;
color:#444;
}

.sidebar button.active{
background:#111;
}

.sidebar button.active i{
color:white;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
overflow:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#fff;
padding:25px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
text-align:center;
}

.card h2{
font-size:36px;
color:#6c7cff;
}

.card p{
margin-top:8px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<button class="active">
<i class="ri-dashboard-line"></i>
</button>

<button onclick="location.href='admin-courses.html'">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='admin-quiz.html'">
<i class="ri-question-line"></i>
</button>

<button onclick="location.href='admin-feedback.html'">
<i class="ri-chat-3-line"></i>
</button>

<button onclick="location.href='admin-analytics.html'">
<i class="ri-bar-chart-line"></i>
</button>
<button onclick="logout()">
<i class="ri-logout-box-line"></i>
</button>
<i class="ri-user-line"></i>
</div>

<div class="content">

<div class="header">
<h1>Admin Dashboard</h1>
</div>

<div class="grid">

<div class="card">
<h2 id="users">0</h2>
<p>Total Students</p>
</div>

<div class="card">
<h2 id="courses">0</h2>
<p>Total Courses</p>
</div>

<div class="card">
<h2 id="tests">0</h2>
<p>Total Tests Taken</p>
</div>

</div>

</div>

</div>

<script>

const token = localStorage.getItem("token");

async function loadStats(){

const res = await fetch("http://localhost:5000/api/admin/stats");
const data = await res.json();

document.getElementById("users").innerText = data.users;
document.getElementById("courses").innerText = data.courses;
document.getElementById("tests").innerText = data.tests;

}

function logout(){
localStorage.removeItem("token");
window.location.href="login.html";
}

loadStats();

</script>

</body>
</html>
