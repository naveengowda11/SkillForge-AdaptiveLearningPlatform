<!DOCTYPE html>
<html>
<head>
<title>Manage Courses</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

body{
font-family:Inter;
background:linear-gradient(135deg,#c6c4ff,#98c5ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
height:92vh;
background:#f6f7fb;
border-radius:28px;
display:flex;
overflow:hidden;
}

.sidebar{
width:80px;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
}

.sidebar button{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#f0f2f8;
cursor:pointer;
}

.content{
flex:1;
padding:30px;
overflow:auto;
}

.card{
background:white;
padding:20px;
border-radius:18px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

button.add{
background:#6c7cff;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

button.small{
margin-top:8px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#6c7cff;
color:white;
}

.course{
display:flex;
justify-content:space-between;
background:#eef1ff;
padding:12px;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<button onclick="location.href='admin-dashboard.html'">
<i class="ri-dashboard-line"></i>
</button>

<button class="active">
<i class="ri-book-open-line"></i>
</button>

<button onclick="location.href='admin-quiz.html'">
<i class="ri-question-line"></i>
</button>

<button onclick="location.href='admin-feedback.html'">
<i class="ri-chat-3-line"></i>
</button>

</div>

<div class="content">

<h1>Manage Courses</h1>

<div class="card">

<h3>Add Course</h3>

<input id="title" placeholder="Course Title">
<textarea id="description" placeholder="Course Description"></textarea>
<input id="category" placeholder="Course Category">
<input type="file" id="video">

<h4>Course Outcomes</h4>
<div id="outcomes"></div>
<button class="small" onclick="addOutcome()">Add Outcome</button>

<h4>Modules</h4>
<div id="modules"></div>
<button class="small" onclick="addModule()">Add Module</button>

<br><br>

<button class="add" onclick="addCourse()">Add Course</button>

</div>

<div class="card">
<h3>Courses</h3>
<div id="courseList"></div>
</div>

</div>

</div>

<script>

/* ================= OUTCOME ================= */

function addOutcome(){

const input=document.createElement("input");
input.placeholder="What student will learn";

document.getElementById("outcomes").appendChild(input);

}

/* ================= MODULE ================= */

function addModule(){

const div=document.createElement("div");

div.innerHTML=`
<input class="moduleTitle" placeholder="Module Title">

<div class="lessons"></div>

<button class="small" onclick="addLesson(this)">
Add Lesson
</button>
`;

document.getElementById("modules").appendChild(div);

}

/* ================= LESSON ================= */

function addLesson(btn){

const container=btn.previousElementSibling;

const div=document.createElement("div");

div.innerHTML=`
<input class="lessonTitle" placeholder="Lesson Title">
<input type="file" class="lessonVideo" accept="video/*">
`;

container.appendChild(div);

}

/* ================= LOAD COURSES ================= */

async function loadCourses(){

const res=await fetch("http://localhost:5000/api/admin/courses");

const courses=await res.json();

const box=document.getElementById("courseList");

box.innerHTML="";

courses.forEach(course=>{

box.innerHTML+=`
<div class="course">

<div>
<h3>${course.title}</h3>
<p>${course.description}</p>
</div>

<button onclick="deleteCourse(${course.id})">
Delete
</button>

</div>
`;

});

}

/* ================= ADD COURSE ================= */

async function addCourse(){

const title=document.getElementById("title").value;
const description=document.getElementById("description").value;
const category=document.getElementById("category").value;
const video=document.getElementById("video").files[0];

if(!title || !description){
alert("Please enter course details");
return;
}

const outcomes=[
...document.querySelectorAll("#outcomes input")
].map(i=>i.value).filter(v=>v.trim()!=="");

const modules=[];

document.querySelectorAll("#modules > div").forEach(module=>{

const moduleTitle=module.querySelector(".moduleTitle").value;

const lessons=[];

module.querySelectorAll(".lessons > div").forEach(lesson=>{

const title=lesson.querySelector(".lessonTitle").value;

lessons.push({title});

});

modules.push({
title:moduleTitle,
lessons
});

});

const formData=new FormData();

formData.append("title",title);
formData.append("description",description);
formData.append("category",category);

if(video){
formData.append("video",video);
}

formData.append("outcomes",JSON.stringify(outcomes));
formData.append("modules",JSON.stringify(modules));

let videoIndex=0;

document.querySelectorAll(".lessonVideo").forEach(input=>{

if(input.files[0]){

formData.append(
"lessonVideo"+videoIndex,
input.files[0]
);

videoIndex++;

}

});

try{

const res=await fetch(
"http://localhost:5000/api/admin/add-course",
{
method:"POST",
body:formData
}
);

const data=await res.json();

alert(data.message || "Course added");

loadCourses();

}catch(err){

alert("Upload failed");

}

}

/* ================= DELETE COURSE ================= */

async function deleteCourse(id){

if(!confirm("Delete this course?")) return;

await fetch(
`http://localhost:5000/api/admin/course/${id}`,
{
method:"DELETE"
}
);

loadCourses();

}

/* ================= INIT ================= */

loadCourses();

</script>

</body>
</html>
